<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TaskFlow{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #192141;
            --bg-secondary: #252542;
            --bg-card: #1a2540;
            --text-primary: #e0e0e0;
            --text-muted: #a0a0b0;
            --color-primary: #4a6ef0;
            --input-bg: #252542;
            --border-color: #3a4480;
        }
        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }
        .navbar {
            background-color: var(--bg-secondary) !important;
        }
        .navbar-brand, .nav-link {
            color: var(--text-primary) !important;
        }
        .navbar-text {
            color: var(--text-muted) !important;
        }
        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
        }
        .card-header {
            background-color: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
        }
        .form-control {
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
        }
        .form-control:focus {
            background-color: var(--input-bg);
            border-color: var(--color-primary);
            color: var(--text-primary);
        }
        .form-control::placeholder {
            color: var(--text-muted);
        }
        .form-label {
            color: var(--text-primary);
        }
        .form-check-label {
            color: var(--text-primary);
        }
        .form-check-input {
            background-color: var(--input-bg);
            border-color: var(--border-color);
        }
        .form-check-input:checked {
            background-color: var(--color-primary);
            border-color: var(--color-primary);
        }
        .form-text {
            color: var(--text-muted);
        }
        .btn-primary {
            background-color: var(--color-primary);
            border-color: var(--color-primary);
        }
        .btn-primary:hover {
            background-color: #3a5ee0;
            border-color: #3a5ee0;
        }
        .btn-secondary {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
        }
        .btn-secondary:hover {
            background-color: var(--border-color);
            color: var(--text-primary);
        }
        .btn-success {
            background-color: #2ea44f;
            border-color: #2ea44f;
        }
        .btn-danger {
            background-color: #da3633;
            border-color: #da3633;
        }
        .text-muted {
            color: var(--text-muted) !important;
        }
        .alert {
            border: 1px solid transparent;
        }
        .alert-success {
            background-color: rgba(46, 164, 79, 0.2);
            border-color: #2ea44f;
            color: #7ee787;
        }
        .alert-danger {
            background-color: rgba(218, 54, 51, 0.2);
            border-color: #da3633;
            color: #ff7b72;
        }
        .alert-warning {
            background-color: rgba(210, 153, 34, 0.2);
            border-color: #d29922;
            color: #e3b341;
        }
        .alert-info {
            background-color: rgba(74, 110, 240, 0.2);
            border-color: #4a6ef0;
            color: #79b8ff;
        }
        .list-group-item {
            background-color: var(--bg-card);
            border-color: var(--border-color);
            color: var(--text-primary);
        }
        .list-group-item-success {
            background-color: rgba(46, 164, 79, 0.15);
            border-color: #2ea44f;
        }
        .badge.bg-info {
            background-color: var(--color-primary) !important;
        }
        .badge.bg-secondary {
            background-color: var(--bg-secondary) !important;
        }
        a {
            color: var(--color-primary);
        }
        a:hover {
            color: #79b8ff;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="{% url 'dashboard' %}">TaskFlow</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    {% if user.is_authenticated %}
                        <li class="nav-item">
                            <span class="navbar-text me-3">Hello, {{ user.username }}</span>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'logout' %}">Logout</a>
                        </li>
                    {% else %}
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'login' %}">Login</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'signup' %}">Sign Up</a>
                        </li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}
        
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
